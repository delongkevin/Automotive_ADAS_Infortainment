; T32 Remote API connection configuration for T32_API.exe
;
; This file is read by T32_API.exe at startup to establish a TCP/IP
; connection to the already-running Trace32 instance.
;
; Requirements:
;   - Trace32 must be launched separately with RCL=NETASSIST and PORT=20000
;     in its config.t32 (e.g. C:\T32\config.t32).
;   - Trace32 must be fully started before the CANoe test sequence calls
;     any T32 API command.
;
; If Trace32 is configured to listen on a different port, update PORT= below
; to match the value in your Trace32 config.t32.

NODE=localhost
PORT=20000
PACKLEN=1024
