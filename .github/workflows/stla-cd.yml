# =============================================================================
# STLA CVADAS ADAS SW Test – Continuous Delivery (CD)
# =============================================================================
#
# Project   : L2H4060 CVADAS BEV – ADAS Camera / Surround-View System
# Folder    : OEM/Stellantis/STLA_SWTest/
#
# Triggered when a version tag (stla-v*) is pushed or a GitHub Release
# is published.  Completely independent of the GM VIP Automation pipeline.
#
# Pipeline overview
# -----------------
#   1. validate-scripts  – Python syntax gate (fast-fail)
#   2. simulate          – test simulation + HTML report generation
#   3. release           – attaches the simulation report and summary as
#                          assets on the GitHub Release
#
# Bench stages (Flash ECU, BVT, SWQT Tests, CPU Load) require a
# self-hosted Windows runner with CANoe, Lauterbach T32, and the physical
# ADAS ECU connected.  Configure a self-hosted runner with the label
# "windows-bench" in your repository settings to enable hardware-in-loop
# testing.  When ready, uncomment the "bench-test" job below and set:
#   POWERSUPPLY_PORT   – e.g. COM4
#   BENCH_STAGING_DIR  – optional staging path on the bench PC
# =============================================================================

name: STLA CD

on:
  push:
    tags:
      - 'stla-v*'
  release:
    types: [published]

# Restrict default token permissions to read-only for the whole workflow.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 – Python Script Validation (fast-fail gate)
  # ---------------------------------------------------------------------------
  validate-scripts:
    name: Validate Python Scripts
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Syntax-check all STLA Python scripts
        run: |
          python -m py_compile OEM/Stellantis/STLA_SWTest/simulate_tests.py
          python -m py_compile OEM/Stellantis/STLA_SWTest/config/Jenkins/arg_parser.py
          python -m py_compile OEM/Stellantis/STLA_SWTest/config/Scripts/report_parser.py
          python -m py_compile OEM/Stellantis/STLA_SWTest/BVTRBS/03_VariantDependent/Customer/CVADAS_RBS_TRSC/Check_Port.py
          python -m py_compile OEM/Stellantis/STLA_SWTest/BVTRBS/03_VariantDependent/Customer/CVADAS_RBS_TRSC/CPU_Load_Graph_Parser.py
          python -m py_compile OEM/Stellantis/STLA_SWTest/BVTRBS/03_VariantDependent/Customer/CVADAS_RBS_TRSC/Image_Comparison.py
          python -m py_compile OEM/Stellantis/STLA_SWTest/BVTRBS/03_VariantDependent/Customer/CVADAS_RBS_TRSC/PowerSupply_Lauterbach.py
          echo "All STLA Python scripts passed syntax check."

  # ---------------------------------------------------------------------------
  # Job 2 – Test Simulation + HTML Report
  # ---------------------------------------------------------------------------
  simulate:
    name: Simulate STLA Test Cases
    runs-on: ubuntu-latest
    needs: validate-scripts
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run STLA test simulation
        run: |
          python OEM/Stellantis/STLA_SWTest/simulate_tests.py \
            --root    OEM/Stellantis/STLA_SWTest \
            --out-dir "OEM/Stellantis/STLA_SWTest/Test Reports/simulation"

      - name: Upload simulation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stla-simulation-artifacts
          path: |
            OEM/Stellantis/STLA_SWTest/Test Reports/simulation/simulation_report.html
            OEM/Stellantis/STLA_SWTest/Test Reports/simulation/simulation_summary.txt
            OEM/Stellantis/STLA_SWTest/Test Reports/simulation/junit/*.xml
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Job 3 – Attach release assets to the GitHub Release
  # ---------------------------------------------------------------------------
  release:
    name: Publish Release Assets
    runs-on: ubuntu-latest
    needs: simulate
    # Only attach assets when a tag was pushed (creates a Release).
    if: startsWith(github.ref, 'refs/tags/stla-v')
    permissions:
      contents: write

    steps:
      - name: Download simulation artifacts
        uses: actions/download-artifact@v4.1.3
        with:
          name: stla-simulation-artifacts
          path: release-assets

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/simulation_report.html
            release-assets/simulation_summary.txt

  # ---------------------------------------------------------------------------
  # Job 4 – Bench Hardware-in-Loop (self-hosted, opt-in)
