# =============================================================================
# STLA CVADAS ADAS SW Test – Continuous Testing (CT)
# =============================================================================
#
# Project   : L2H4060 CVADAS BEV – ADAS Camera / Surround-View System
# Folder    : OEM/Stellantis/STLA_SWTest/
#
# Runs the full STLA script validation and test simulation on a daily
# schedule to catch regressions between feature commits.
# Completely independent of the GM VIP Automation pipeline.
#
# Triggers
# --------
#   • Scheduled  – every day at 03:00 UTC
#                  (offset from GM VIP CT at 02:00 to avoid runner contention)
#   • Manual     – workflow_dispatch for ad-hoc simulation runs
#
# Jobs
#   1. validate-scripts  – Python syntax gate
#   2. simulate-all      – simulate every STLA test suite, generate HTML report
#   3. summary           – write a pass/fail table to the GitHub Actions summary
#
# Artifacts retained (30 days)
#   stla-simulation-report-<date>   – consolidated HTML report
#   stla-simulation-summary-<date>  – plain-text summary table
#   stla-junit-results-<date>       – JUnit XML files
# =============================================================================

name: STLA CT – Continuous Testing

on:
  schedule:
    # Every day at 03:00 UTC (offset from GM VIP CT at 02:00)
    - cron: '0 3 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
    paths:
      - 'OEM/Stellantis/STLA_SWTest/**'
      - '.github/workflows/stla-ct.yml'

# Restrict default token permissions to read-only for the whole workflow.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 – Python Script Validation
  # ---------------------------------------------------------------------------
  validate-scripts:
    name: Validate Python Scripts
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Syntax-check all STLA Python scripts
        run: |
          python -m py_compile OEM/Stellantis/STLA_SWTest/simulate_tests.py
          python -m py_compile OEM/Stellantis/STLA_SWTest/config/Jenkins/arg_parser.py
          python -m py_compile OEM/Stellantis/STLA_SWTest/config/Scripts/report_parser.py
          python -m py_compile OEM/Stellantis/STLA_SWTest/BVTRBS/03_VariantDependent/Customer/CVADAS_RBS_TRSC/Check_Port.py
          python -m py_compile OEM/Stellantis/STLA_SWTest/BVTRBS/03_VariantDependent/Customer/CVADAS_RBS_TRSC/CPU_Load_Graph_Parser.py
          python -m py_compile OEM/Stellantis/STLA_SWTest/BVTRBS/03_VariantDependent/Customer/CVADAS_RBS_TRSC/Image_Comparison.py
          python -m py_compile OEM/Stellantis/STLA_SWTest/BVTRBS/03_VariantDependent/Customer/CVADAS_RBS_TRSC/PowerSupply_Lauterbach.py
          echo "All STLA Python scripts passed syntax check."

  # ---------------------------------------------------------------------------
  # Job 2 – Full Test Simulation
  # ---------------------------------------------------------------------------
  simulate-all:
    name: Simulate All STLA Test Suites
    runs-on: ubuntu-latest
    needs: validate-scripts
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run full STLA test simulation
        run: |
          python OEM/Stellantis/STLA_SWTest/simulate_tests.py \
            --root    OEM/Stellantis/STLA_SWTest \
            --out-dir "OEM/Stellantis/STLA_SWTest/Test Reports/simulation"

      - name: Set date stamp for artifact names
        if: always()
        run: echo "DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Upload JUnit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stla-junit-results-${{ env.DATE }}
          path: OEM/Stellantis/STLA_SWTest/Test Reports/simulation/junit/*.xml
          if-no-files-found: warn
          retention-days: 30

      - name: Upload simulation HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stla-simulation-report-${{ env.DATE }}
          path: OEM/Stellantis/STLA_SWTest/Test Reports/simulation/simulation_report.html
          if-no-files-found: warn
          retention-days: 30

      - name: Upload simulation summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stla-simulation-summary-${{ env.DATE }}
          path: OEM/Stellantis/STLA_SWTest/Test Reports/simulation/simulation_summary.txt
          if-no-files-found: warn
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 3 – GitHub Actions job summary
  # ---------------------------------------------------------------------------
  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: simulate-all
    if: always()
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set date stamp
        run: echo "DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Download simulation summary
        uses: actions/download-artifact@v4.1.3
        with:
          name: stla-simulation-summary-${{ env.DATE }}
          path: summary-output
        continue-on-error: true

      - name: Write job summary
        if: always()
        run: |
          echo "## STLA CVADAS ADAS SW Test – CT Run $(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stage | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Script Validation | ${{ needs.validate-scripts.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test Simulation   | ${{ needs.simulate-all.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> Bench stages (Flash ECU, BVT, SWQT Tests, CPU Load) run on" >> "$GITHUB_STEP_SUMMARY"
          echo "> the \`windows-bench\` self-hosted runner via the Jenkins pipeline." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f summary-output/simulation_summary.txt ]; then
            echo "### Simulation Summary" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat summary-output/simulation_summary.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail job if simulation had errors
        if: needs.simulate-all.result == 'failure'
        run: |
          echo "::error::STLA test simulation failed. Check the stla-simulation-report artifact."
          exit 1
