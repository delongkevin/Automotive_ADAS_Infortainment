# =============================================================================
# GM VIP Automation – Continuous Delivery (CD)
# =============================================================================
#
# Triggered when a version tag (v*) is pushed to the repository, or when a
# GitHub Release is published.
#
# Pipeline overview
# -----------------
#   1. capl-validate  – same CAPL static-analysis gate as CI
#   2. dotnet-build   – compile dotnetT32dll.dll from source (.NET 8.0) and
#                       validate the resulting binary before release
#   3. simulate       – test simulation + HTML report generation
#   4. release        – attaches the consolidated simulation report and
#                       the simulation summary as assets on the GitHub Release
#
# Bench stages (Flash ECU, BVT, Execute Test Suite) require a self-hosted
# Windows runner with CANoe, Trace32, and physical ECU hardware.
# Add a self-hosted runner with the label "windows-bench" to your repository
# settings to enable hardware-in-loop testing.  When that runner is available,
# uncomment the "bench-test" job below and set the required secrets:
#   POWERSUPPLY_PORT   – e.g. COM3
#   BENCH_STAGING_DIR  – optional staging path on the bench PC
# =============================================================================

name: GM VIP CD

on:
  push:
    tags:
      - 'gm-v*'
  release:
    types: [published]

# Restrict default token permissions to read-only for the whole workflow.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 – CAPL Validation (fast-fail gate)
  # ---------------------------------------------------------------------------
  capl-validate:
    name: CAPL Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install --upgrade pip

      - name: Run CAPL syntax and consistency validation
        run: |
          python OEM/GM/GM_VIP_Automation/validate_capl.py \
            --root OEM/GM/GM_VIP_Automation

  # ---------------------------------------------------------------------------
  # Job 2 – Build dotnetT32dll.dll from source (.NET 8.0)
  # ---------------------------------------------------------------------------
  dotnet-build:
    name: Build dotnetT32dll (.NET 8.0)
    runs-on: ubuntu-latest
    needs: capl-validate
    permissions:
      contents: read

    env:
      DOTNET_PROJ: OEM/GM/GM_VIP_Automation/AutomationDependent/GenericLibraries/dotnetT32dll
      STUB_OUT:    /tmp/canoe-stub

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install --upgrade pip

      - name: Build VectorCANoe stub assembly
        run: |
          dotnet build "$DOTNET_PROJ/VectorCANoeStub/VectorCANoeStub.csproj" \
            --configuration Release \
            --output "$STUB_OUT"

      - name: Prepare stub directory layout
        run: |
          mkdir -p "$STUB_OUT/net8.0"
          cp "$STUB_OUT/Vector.CANoe.Threading.dll" "$STUB_OUT/net8.0/"

      - name: Build dotnetT32dll.dll
        run: |
          dotnet build "$DOTNET_PROJ/dotnetT32dll.csproj" \
            --configuration Release \
            /p:CANoeExecPath="$STUB_OUT"

      - name: Validate dotnetT32dll build artifacts
        run: |
          python OEM/GM/GM_VIP_Automation/validate_dotnetT32dll.py \
            --root OEM/GM/GM_VIP_Automation

  # ---------------------------------------------------------------------------
  # Job 3 – Test Simulation + HTML Report
  # ---------------------------------------------------------------------------
  simulate:
    name: Simulate Test Cases
    runs-on: ubuntu-latest
    needs: [capl-validate, dotnet-build]
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install --upgrade pip

      - name: Run test simulation
        run: |
          python OEM/GM/GM_VIP_Automation/simulate_tests.py \
            --root    OEM/GM/GM_VIP_Automation \
            --out-dir OEM/GM/GM_VIP_Automation/Test\ Reports/simulation

      - name: Generate simulation HTML report
        run: |
          python OEM/GM/GM_VIP_Automation/merge_reports.py \
            --root      OEM/GM/GM_VIP_Automation \
            --simulated \
            --xml-dir   "OEM/GM/GM_VIP_Automation/Test Reports/simulation" \
            --out       "OEM/GM/GM_VIP_Automation/Test Reports/simulation/simulation_report.html"

      - name: Upload simulation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: simulation-artifacts
          path: |
            OEM/GM/GM_VIP_Automation/Test Reports/simulation/simulation_report.html
            OEM/GM/GM_VIP_Automation/Test Reports/simulation/simulation_summary.txt
            OEM/GM/GM_VIP_Automation/Test Reports/simulation/junit/*.xml
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Job 4 – Attach release assets
  # ---------------------------------------------------------------------------
  release:
    name: Publish Release Assets
    runs-on: ubuntu-latest
    needs: simulate
    # Only run when a tag push created (or is creating) a GitHub Release.
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download simulation artifacts
        uses: actions/download-artifact@v4.1.3
        with:
          name: simulation-artifacts
          path: release-assets

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/simulation_report.html
            release-assets/simulation_summary.txt

