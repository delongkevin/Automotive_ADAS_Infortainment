# =============================================================================
# GM VIP Automation – Continuous Integration (CI)
# =============================================================================
#
# Triggered on every push and pull request.
#
# What runs here (no bench hardware required):
#   1. CAPL Validation     – validate_capl.py
#        Checks bracket balance, #include paths, function declarations, and
#        XML-vs-.can cross-file consistency across all .can/.cin files.
#   2. dotnet Build        – dotnet build dotnetT32dll.csproj
#        Compiles the .NET 8.0 DLL from source using a VectorCANoeStub shim
#        in place of the real CANoe assemblies.  Catches C# compile errors
#        that would otherwise only surface at bench deployment time.
#   3. DLL Validation      – validate_dotnetT32dll.py
#        Verifies that dotnetT32dll.dll (freshly compiled in step 2) is a
#        .NET 8.0 build with all required runtime files and symbols intact.
#        This catches the "Unknown symbol 'dotnetT32dllLib'" CAPL compile
#        error before the DLL reaches a test bench.
#   4. T32 Script Validation – validate_t32_scripts.py
#        Validates Lauterbach Trace32 PRACTICE (.cmm) scripts and the CAPL
#        integration layer (cT32.cin / ccT32.cin) without physical hardware.
#        Catches CMM syntax errors, missing scripts, stale path strings, and
#        out-of-range constant values before they reach the bench.
#   5. Test Simulation     – simulate_tests.py
#        Discovers every testcase definition in the CAPL source files and
#        generates JUnit-compatible XML reports without physical hardware.
#   6. Simulation Report   – merge_reports.py
#        Merges the per-suite simulated XMLs into a single HTML report and
#        uploads it as a build artifact.
#
# Bench-only stages (Flash ECU, BVT, Execute Test Suite) require a
# self-hosted Windows runner with CANoe and Trace32 installed.
# They are defined in cd.yml and triggered when deploying a release.
# =============================================================================

name: GM VIP CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'fix/**'
    paths:
      - 'GM_VIP_Automation/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'GM_VIP_Automation/**'
      - '.github/workflows/ci.yml'

# Restrict default token permissions to read-only for the whole workflow.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 – CAPL Validation
  # ---------------------------------------------------------------------------
  capl-validate:
    name: CAPL Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install --upgrade pip

      - name: Run CAPL syntax and consistency validation
        run: |
          python GM_VIP_Automation/validate_capl.py \
            --root GM_VIP_Automation

  # ---------------------------------------------------------------------------
  # Job 2 – Build dotnetT32dll.dll from source (.NET 8.0)
  # ---------------------------------------------------------------------------
  dotnet-build:
    name: Build dotnetT32dll (.NET 8.0)
    runs-on: ubuntu-latest
    needs: capl-validate
    permissions:
      contents: read

    env:
      DOTNET_PROJ: GM_VIP_Automation/AutomationDependent/GenericLibraries/dotnetT32dll
      STUB_OUT:    /tmp/canoe-stub

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build VectorCANoe stub assembly
        # Produces Vector.CANoe.Threading.dll so the main project can be
        # compiled without a real Vector CANoe installation.
        run: |
          dotnet build "$DOTNET_PROJ/VectorCANoeStub/VectorCANoeStub.csproj" \
            --configuration Release \
            --output "$STUB_OUT"

      - name: Prepare stub directory layout
        # CANoeExecPath\net8.0\Vector.CANoe.Threading.dll is the HintPath
        # used in dotnetT32dll.csproj; replicate that structure with the stub.
        run: |
          mkdir -p "$STUB_OUT/net8.0"
          cp "$STUB_OUT/Vector.CANoe.Threading.dll" "$STUB_OUT/net8.0/"

      - name: Build dotnetT32dll.dll
        # Pass the stub directory as CANoeExecPath so MSBuild resolves the
        # reference.  The AfterBuild target in the .csproj copies the output
        # DLL + runtimeconfig.json + deps.json to controlLib/T32/ automatically.
        run: |
          dotnet build "$DOTNET_PROJ/dotnetT32dll.csproj" \
            --configuration Release \
            /p:CANoeExecPath="$STUB_OUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install --upgrade pip

      - name: Validate dotnetT32dll build artifacts
        # Run the full validator against the freshly compiled DLL to catch
        # .NET 8 targeting, required symbols, and .cin API consistency issues.
        run: |
          python GM_VIP_Automation/validate_dotnetT32dll.py \
            --root GM_VIP_Automation

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install --upgrade pip

      - name: Run dotnetT32dll validation
        run: |
          python GM_VIP_Automation/validate_dotnetT32dll.py \
            --root GM_VIP_Automation

  # ---------------------------------------------------------------------------
  # Job 3 – DLL Validation (committed artifacts)
  # ---------------------------------------------------------------------------
  # Validates the dotnetT32dll.dll binary that is committed to the repository
  # (controlLib/T32/) independently of the dotnet-build job.  This catches the
  # case where someone edits dotnetT32dll.cs but forgets to rebuild and commit
  # the updated DLL before opening a PR.
  # ---------------------------------------------------------------------------
  dotnetdll-validate:
    name: DLL Validation (dotnetT32dll)
    runs-on: ubuntu-latest
    needs: capl-validate
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install --upgrade pip

      - name: Validate dotnetT32dll build artifacts
        # Validates the committed DLL (controlLib/T32/dotnetT32dll.dll).
        # The dotnet-build job validates the freshly compiled DLL.
        run: |
          python GM_VIP_Automation/validate_dotnetT32dll.py \
            --root GM_VIP_Automation

  # ---------------------------------------------------------------------------
  # Job 4 – T32 Script Validation
  # ---------------------------------------------------------------------------
  # Validates Lauterbach Trace32 PRACTICE (.cmm) scripts and the T32/CAPL
  # integration layer without requiring physical hardware or a Trace32
  # installation.  Catches CMM syntax errors, missing scripts, stale path
  # strings and invalid constant values before they reach the bench.
  # ---------------------------------------------------------------------------
  t32-validate:
    name: T32 Script Validation (Lauterbach)
    runs-on: ubuntu-latest
    needs: capl-validate
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install --upgrade pip

      - name: Validate T32 PRACTICE scripts and integration layer
        # Checks CMM script syntax, required file presence, T32 constant
        # validity, and CAPL path consistency -- all without hardware.
        run: |
          python GM_VIP_Automation/validate_t32_scripts.py \
            --root GM_VIP_Automation

  # ---------------------------------------------------------------------------
  # Job 5 – Test Simulation + Report
  # ---------------------------------------------------------------------------
  simulate:
    name: Simulate Test Cases
    runs-on: ubuntu-latest
    needs: [capl-validate, dotnet-build, dotnetdll-validate, t32-validate]
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install --upgrade pip

      - name: Run test simulation
        run: |
          python GM_VIP_Automation/simulate_tests.py \
            --root    GM_VIP_Automation \
            --out-dir GM_VIP_Automation/Test\ Reports/simulation

      - name: Generate simulation HTML report
        if: always()
        run: |
          python GM_VIP_Automation/merge_reports.py \
            --root      GM_VIP_Automation \
            --simulated \
            --xml-dir   "GM_VIP_Automation/Test Reports/simulation" \
            --out       "GM_VIP_Automation/Test Reports/simulation/simulation_report.html"

      - name: Publish JUnit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: GM_VIP_Automation/Test Reports/simulation/junit/*.xml
          if-no-files-found: warn

      - name: Upload simulation HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulation-report
          path: GM_VIP_Automation/Test Reports/simulation/simulation_report.html
          if-no-files-found: warn

      - name: Upload simulation summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulation-summary
          path: GM_VIP_Automation/Test Reports/simulation/simulation_summary.txt
          if-no-files-found: warn
