# =============================================================================
# GM VIP Automation – Continuous Testing (CT)
# =============================================================================
#
# Runs the full CAPL validation, .NET build, and test simulation on a daily
# schedule to catch regressions that time-based changes (e.g. updated test
# suite XMLs or CAPL source edits) may introduce between feature commits.
#
# Triggers
# --------
#   • Scheduled  – every day at 02:00 UTC (configurable via the cron below)
#   • Manual     – workflow_dispatch lets you kick off an ad-hoc simulation
#                  run from the GitHub Actions UI without pushing a commit
#
# Jobs
#   1. capl-validate  – static analysis gate (bracket balance, includes, etc.)
#   2. dotnet-build   – compile dotnetT32dll.dll from source (.NET 8.0) and
#                       validate the resulting binary
#   3. t32-validate   – validate Lauterbach Trace32 PRACTICE scripts and the
#                       T32/CAPL integration layer (no hardware required)
#   4. simulate-all   – simulate every test suite and generate the HTML report
#   5. summary        – print a concise pass/fail table to the run log and
#                       create a job summary visible in the GitHub Actions UI
#
# Artifacts retained
#   simulation-report-<date>   – HTML consolidated report
#   simulation-summary-<date>  – plain-text summary table
#   junit-results-<date>       – JUnit XML files (consumed by test result panels)
# =============================================================================

name: GM VIP CT – Continuous Testing

on:
  schedule:
    # Every day at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
    paths:
      - 'OEM/GM/GM_VIP_Automation/**'
      - '.github/workflows/ct.yml'

# Restrict default token permissions to read-only for the whole workflow.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 – CAPL Validation
  # ---------------------------------------------------------------------------
  capl-validate:
    name: CAPL Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install --upgrade pip

      - name: Run CAPL syntax and consistency validation
        run: |
          python OEM/GM/GM_VIP_Automation/validate_capl.py \
            --root OEM/GM/GM_VIP_Automation

  # ---------------------------------------------------------------------------
  # Job 2 – Build dotnetT32dll.dll from source (.NET 8.0)
  # ---------------------------------------------------------------------------
  dotnet-build:
    name: Build dotnetT32dll (.NET 8.0)
    runs-on: ubuntu-latest
    needs: capl-validate
    permissions:
      contents: read

    env:
      DOTNET_PROJ: OEM/GM/GM_VIP_Automation/AutomationDependent/GenericLibraries/dotnetT32dll
      STUB_OUT:    /tmp/canoe-stub

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install --upgrade pip

      - name: Build VectorCANoe stub assembly
        run: |
          dotnet build "$DOTNET_PROJ/VectorCANoeStub/VectorCANoeStub.csproj" \
            --configuration Release \
            --output "$STUB_OUT"

      - name: Prepare stub directory layout
        run: |
          mkdir -p "$STUB_OUT/net8.0"
          cp "$STUB_OUT/Vector.CANoe.Threading.dll" "$STUB_OUT/net8.0/"

      - name: Build dotnetT32dll.dll
        run: |
          dotnet build "$DOTNET_PROJ/dotnetT32dll.csproj" \
            --configuration Release \
            /p:CANoeExecPath="$STUB_OUT"

      - name: Validate dotnetT32dll build artifacts
        run: |
          python OEM/GM/GM_VIP_Automation/validate_dotnetT32dll.py \
            --root OEM/GM/GM_VIP_Automation

  # ---------------------------------------------------------------------------
  # Job 3 – T32 Script Validation
  # ---------------------------------------------------------------------------
  t32-validate:
    name: T32 Script Validation (Lauterbach)
    runs-on: ubuntu-latest
    needs: capl-validate
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install --upgrade pip

      - name: Validate T32 PRACTICE scripts and integration layer
        run: |
          python OEM/GM/GM_VIP_Automation/validate_t32_scripts.py \
            --root OEM/GM/GM_VIP_Automation

  # ---------------------------------------------------------------------------
  # Job 4 – Full Test Simulation
  # ---------------------------------------------------------------------------
  simulate-all:
    name: Simulate All Test Suites
    runs-on: ubuntu-latest
    needs: [capl-validate, dotnet-build, t32-validate]
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install --upgrade pip

      - name: Run full test simulation
        run: |
          python OEM/GM/GM_VIP_Automation/simulate_tests.py \
            --root    OEM/GM/GM_VIP_Automation \
            --out-dir OEM/GM/GM_VIP_Automation/Test\ Reports/simulation

      - name: Generate consolidated HTML report
        if: always()
        run: |
          python OEM/GM/GM_VIP_Automation/merge_reports.py \
            --root      OEM/GM/GM_VIP_Automation \
            --simulated \
            --xml-dir   "OEM/GM/GM_VIP_Automation/Test Reports/simulation" \
            --out       "OEM/GM/GM_VIP_Automation/Test Reports/simulation/simulation_report.html"

      - name: Set date stamp for artifact names
        if: always()
        run: echo "DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Upload JUnit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results-${{ env.DATE }}
          path: OEM/GM/GM_VIP_Automation/Test Reports/simulation/junit/*.xml
          if-no-files-found: warn
          retention-days: 30

      - name: Upload simulation HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulation-report-${{ env.DATE }}
          path: OEM/GM/GM_VIP_Automation/Test Reports/simulation/simulation_report.html
          if-no-files-found: warn
          retention-days: 30

      - name: Upload simulation summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulation-summary-${{ env.DATE }}
          path: OEM/GM/GM_VIP_Automation/Test Reports/simulation/simulation_summary.txt
          if-no-files-found: warn
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 4 – GitHub Actions job summary
  # ---------------------------------------------------------------------------
  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [capl-validate, dotnet-build, t32-validate, simulate-all]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set date stamp
        run: echo "DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Download simulation summary
        uses: actions/download-artifact@v4.1.3
        with:
          name: simulation-summary-${{ env.DATE }}
          path: summary-output
        continue-on-error: true

      - name: Write job summary
        if: always()
        run: |
          echo "## GM VIP Automation – CT Run $(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stage | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| CAPL Validation    | ${{ needs.capl-validate.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| dotnet Build (.NET 8) | ${{ needs.dotnet-build.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| T32 Script Validation | ${{ needs.t32-validate.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test Simulation    | ${{ needs.simulate-all.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f summary-output/simulation_summary.txt ]; then
            echo "### Simulation Summary" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat summary-output/simulation_summary.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail job if simulation had errors
        if: needs.simulate-all.result == 'failure'
        run: |
          echo "::error::Test simulation failed. Check the simulation-report artifact for details."
          exit 1
